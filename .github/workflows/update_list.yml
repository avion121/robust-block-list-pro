name: Update Block List

on:
  schedule:
    - cron: '0 5 * * *'  # 5 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate lists
        run: python generate_list.py

      - name: Commit changes
        run: |
          git config --global user.name "Auto Updater"
          git config --global user.email "updater@robustblock.com"
          git add robust_block_list_pro.txt dns_blocker.mobileconfig
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
