name: Update Combined List

on:
  schedule:
    - cron: "0 5 * * *"  # Runs daily at 5:00 AM UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  update_list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run combine script
        run: python combine.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add robust_block_list_pro.txt
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Update robust_block_list_pro.txt [skip ci]"
          git push
